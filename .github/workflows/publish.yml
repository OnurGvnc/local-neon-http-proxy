name: Create and publish a Docker image

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

# https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      REGISTRY_IMAGE: ${{ steps.registry.outputs.REGISTRY_IMAGE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Registry image name
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        id: registry
        run: |
          echo "REGISTRY_IMAGE=${REGISTRY@L}/${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

  build:
    needs:
      - prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Sanitize platform
        id: sanitize
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.REGISTRY_IMAGE }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,manifest-descriptor # used by GitHub packages for digest annotation

      - name: Build by digest
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/neon-proxy/
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: |
            type=image,name=${{ needs.prepare.outputs.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=buildkit-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ steps.sanitize.outputs.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-image.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Extract and upload proxy binary
        run: |
          # Create a temporary container and extract the binary
          CONTAINER_ID=$(docker create ${{ needs.prepare.outputs.REGISTRY_IMAGE }}@${{ steps.build-image.outputs.digest }})
          mkdir -p /tmp/binaries
          docker cp $CONTAINER_ID:/app/neon-proxy /tmp/binaries/neon-proxy-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          docker rm $CONTAINER_ID
          chmod +x /tmp/binaries/neon-proxy-${{ steps.sanitize.outputs.PLATFORM_PAIR }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-proxy-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          path: /tmp/binaries/*
          if-no-files-found: error
          retention-days: 7

  build-macos:
    needs:
      - prepare
    runs-on: macos-14
    steps:
      - name: Set platform name
        id: sanitize
        run: |
          echo "PLATFORM_PAIR=darwin-arm64" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set NEON_RELEASE_TAG
        run: |
          NEON_TAG=$(grep "ARG NEON_RELEASE_TAG=" ./docker/neon-proxy/Dockerfile | head -n 1 | cut -d '=' -f 2)
          echo "NEON_RELEASE_TAG=$NEON_TAG" >> $GITHUB_ENV

      - name: Clone and build Neon proxy
        run: |
          git clone --depth=1 --branch $NEON_RELEASE_TAG https://github.com/neondatabase/neon.git
          cd neon
          cargo build --bin proxy --release --features "testing"
          
          # Create the binary with platform in filename
          mkdir -p /tmp/binaries
          cp ./target/release/proxy /tmp/binaries/neon-proxy-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          chmod +x /tmp/binaries/neon-proxy-${{ steps.sanitize.outputs.PLATFORM_PAIR }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-proxy-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          path: /tmp/binaries/*
          if-no-files-found: error
          retention-days: 7

  merge:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
      - build-macos
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.REGISTRY_IMAGE }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index # used by GitHub packages for manifest annotation

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS=$(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          ANNOTATIONS=$(jq -cr '.annotations | map("--annotation \"" + . + "\"") | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          SOURCE=$(printf '${{ needs.prepare.outputs.REGISTRY_IMAGE }}@sha256:%s ' *)
          eval "docker buildx imagetools create $TAGS $ANNOTATIONS $SOURCE"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.prepare.outputs.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-macos
      - merge
    permissions:
      contents: write
    steps:
      - name: Create binaries directory
        run: mkdir -p ./binaries

      - name: Download Linux AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: neon-proxy-linux-amd64
          path: ./binaries

      - name: Download Linux ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: neon-proxy-linux-arm64
          path: ./binaries

      - name: Download macOS ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: neon-proxy-darwin-arm64
          path: ./binaries

      - name: List downloaded binaries
        run: |
          echo "Contents of binaries directory:"
          ls -la ./binaries/

      - name: Generate release date
        id: date
        run: echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Get NEON_RELEASE_TAG from Dockerfile
        id: neon_tag
        run: |
          curl -s https://raw.githubusercontent.com/${{ github.repository }}/main/docker/neon-proxy/Dockerfile | grep "ARG NEON_RELEASE_TAG=" | head -n 1 | cut -d '=' -f 2 > neon_tag.txt
          echo "NEON_TAG=$(cat neon_tag.txt)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Neon Proxy ${{ steps.date.outputs.RELEASE_DATE }} (Neon ${{ steps.neon_tag.outputs.NEON_TAG }})
          tag_name: release-${{ steps.date.outputs.RELEASE_DATE }}
          body: |
            Neon HTTP Proxy binaries built from Neon release tag: ${{ steps.neon_tag.outputs.NEON_TAG }}
            
            ## Binaries
            - Linux AMD64: `neon-proxy-linux-amd64`
            - Linux ARM64: `neon-proxy-linux-arm64`
            - macOS ARM64: `neon-proxy-darwin-arm64`
            
            Built on: ${{ steps.date.outputs.RELEASE_DATE }}
          files: |
            ./binaries/*
          draft: false
          prerelease: false
